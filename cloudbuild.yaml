steps:
  # ── BACKEND ──────────────────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: build-backend
    args:
      [
        "build",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/instagram/backend:$BUILD_ID",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/instagram/backend:latest",
        "./backend",
      ]

  - name: "gcr.io/cloud-builders/docker"
    id: push-backend
    waitFor: ["build-backend"]
    args:
      [
        "push",
        "--all-tags",
        "us-central1-docker.pkg.dev/$PROJECT_ID/instagram/backend",
      ]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-backend
    waitFor: ["push-backend"]
    entrypoint: gcloud
    args:
      [
        "run",
        "deploy",
        "instagram-backend",
        "--image",
        "us-central1-docker.pkg.dev/$PROJECT_ID/instagram/backend:$BUILD_ID",
        "--region",
        "$_REGION",
        "--platform",
        "managed",
        "--allow-unauthenticated",
        "--port",
        "8080",
        "--update-env-vars",
        "NODE_ENV=production",
        "--min-instances",
        "1",
      ]

  # ── FRONTEND ─────────────────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: build-frontend
    # Build after backend is deployed so $_BACKEND_URL is the live service URL
    waitFor: ["deploy-backend"]
    args:
      [
        "build",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/instagram/frontend:$BUILD_ID",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/instagram/frontend:latest",
        "--build-arg",
        "VITE_API_BASE_URL=$_BACKEND_URL",
        "--build-arg",
        "VITE_DEFAULT_TENANT_SLUG=$_TENANT_SLUG",
        "./frontend",
      ]

  - name: "gcr.io/cloud-builders/docker"
    id: push-frontend
    waitFor: ["build-frontend"]
    args:
      [
        "push",
        "--all-tags",
        "us-central1-docker.pkg.dev/$PROJECT_ID/instagram/frontend",
      ]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-frontend
    waitFor: ["push-frontend"]
    entrypoint: gcloud
    args:
      [
        "run",
        "deploy",
        "pictura",
        "--image",
        "us-central1-docker.pkg.dev/$PROJECT_ID/instagram/frontend:$BUILD_ID",
        "--region",
        "$_REGION",
        "--platform",
        "managed",
        "--allow-unauthenticated",
        "--port",
        "80",
        "--min-instances",
        "1",
      ]

options:
  substitutionOption: ALLOW_LOOSE
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: "us-central1"
  _REPO: "instagram"
  # Set this in your Cloud Build trigger substitutions to your backend Cloud Run URL.
  # Example: https://instagram-backend-xxxx-uc.a.run.app
  # On the very first deploy you can leave it empty and set it manually after.
  _BACKEND_URL: ""
  _TENANT_SLUG: "demo"
